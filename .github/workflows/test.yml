on:
  push:
    branches:
      - master
    paths:
      - "**"
      - "!docs/**"
      - "!**.md"
  pull_request:
    paths:
      - "**"
      - "!docs/**"
      - "!**.md"

name: Test
jobs:
  Build:
    strategy:
      matrix:
        go-version: [1.21.x, 1.22.x, 1.23.x, 1.24.x, 1.25.x]
      fail-fast: false
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Fetch Repository
        uses: actions/checkout@v6

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ matrix.go-version }}-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-${{ matrix.go-version }}-
            ${{ runner.os }}-go-

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@latest
        continue-on-error: true

      - name: Download dependencies
        run: go mod download
        continue-on-error: true

      - name: Test (with coverage)
        run: gotestsum -f testname -- ./... -race -count=1 -timeout=30m -coverprofile=coverage.txt -covermode=atomic -shuffle=on
        timeout-minutes: 60
        continue-on-error: true # 即使测试失败也继续

      - name: Check coverage file exists
        id: check_coverage
        if: matrix.go-version == '1.22.x'
        run: |
          if [ -f coverage.txt ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "✅ Coverage file exists"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "⚠️ Coverage file not found"
          fi
        shell: bash
        continue-on-error: true

      - name: Upload coverage reports to Codecov
        if: always() && steps.check_coverage.outputs.exists == 'true'
        uses: codecov/codecov-action@v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./coverage.txt
          flags: unittests
          slug: kamalyes/go-pbmo
          fail_ci_if_error: false # 上传失败不影响 CI
        continue-on-error: true # 上传失败也不影响整个流程
